version: '3.8'

services:

  postgres:
    image: postgres
    environment:
      POSTGRES_DB: microservicios
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  users-service:
    build: ./users-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservicios
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    tasks-service:
      build: ./tasks-service
      ports:
        - "8081:8081"
      depends_on:
        - postgres
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservicios
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: postgres
        NOTIFICATIONS_SERVICE_URL: http://notifications-service:8083
        USERS_SERVICE_URL: http://users-service:8082

    notifications-service:
      build: ./notifications-service
      ports:
        - "8083:8083"
      depends_on:
        - postgres
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservicios
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: postgres